<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Peserta | Tahsin Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-['Inter']">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="index.html" class="text-3xl font-bold text-emerald-700">Tahsin<span class="text-slate-700">Online</span></a>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
            <h2 class="text-2xl font-bold text-slate-800 mb-2 italic">Login Peserta</h2>
            <p class="text-slate-500 text-sm mb-6 font-medium">Masukkan email untuk mengakses kelas</p>
            
            <form action="#" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                    <input type="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="peserta@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <input type="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-100">
                    Masuk Sekarang
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">Belum punya akun? <a href="register.html" class="text-emerald-600 font-bold hover:underline">Daftar di sini</a></p>
                <a href="index.html" class="inline-block mt-4 text-xs text-slate-400 hover:text-emerald-600"> Kembali ke Halaman Utama</a>
            </div>
        </div>
    </div>

</body>
<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbyfnATos0y3yLosNqcLnPW9n0nSYhHDbbsJ6gjPTobmCeRjcT7QiMBtyPeyZ_L0rc6A/exec';

    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = this.querySelector('input[type="email"]').value;
        const password = this.querySelector('input[type="password"]').value;
        const btn = this.querySelector('button');

        btn.innerText = "Memverifikasi...";
        btn.disabled = true;

        // Mengirim permintaan ke Google Sheet
        fetch(`${scriptURL}?action=login&email=${email}&password=${password}`)
            .then(response => response.json())
            .then(result => {
                if (result.status === "success") {
                    // Simpan identitas user di browser agar Dashboard bisa mengenali
                    localStorage.setItem('userName', result.nama);
                    localStorage.setItem('userPaket', result.paket);
                    
                    // Pindah ke halaman dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Maaf, Email atau Password salah.");
                    btn.innerText = "Masuk Sekarang";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error!', error);
                alert("Terjadi kesalahan koneksi.");
                btn.innerText = "Masuk Sekarang";
                btn.disabled = false;
            });
    });
</script>
</html>
